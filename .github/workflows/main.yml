name: Selenium Regression Suite

# Run the pipeline on every push to the main branch
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Pull the code from GitHub to runner
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Java environment (JDK 21)
      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # 3. Setup Chrome
      # GitHub Hosted Runners already have Chrome installed.
      # This step just verifies the version to ensure it's ready.
      - name: Check Browser Version
        run: google-chrome --version

      # 4. Run Cucumber Tests
      - name: Run Cucumber Tests
        # Adding -Dmaven.test.failure.ignore=true ensures the report is always generated
        run: mvn clean verify -Dtest=Runner.TestRunner -Dbrowser=headless -PRegression -Dmaven.test.failure.ignore=true

      # 5. Run Reruns (Only if failed.txt is not empty)
      - name: Run Failed Tests Rerun
        if: always()
        run: |
          if [ -s target/failed.txt ]; then
            mvn test -Dtest=FailedTestRunner -Dbrowser=headless
          else
            echo "No failed tests to rerun."
          fi

      # 6. Upload Artifacts
      - name: Upload Cucumber Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-test-reports
          path: target/cucumber-visual-report/
          retention-days: 5

      # 7. Publish Test Summary in Table format
      - name: Publish Test Summary
        if: always()
        run: |
          echo "### 📊 Cucumber Execution Scorecard" >> $GITHUB_STEP_SUMMARY
          echo "| Test Phase | Result | Status |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :---: | :---: |" >> $GITHUB_STEP_SUMMARY

          if [ -f "target/cucumber-reports/cucumber.json" ]; then
            echo "| Main Suite | ✅ Completed | 📊 Check Report |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Main Suite | ❌ Missing | No JSON Found |" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -f "target/cucumber-reports/rerun.json" ]; then
            echo "| Rerun Attempt | 🔄 Executed | 🛠️ Retried |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Rerun Attempt | - | No Failures |" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> 💡 Tip: Download the cucumber-test-reports artifact to see full screenshots of any failures." >> $GITHUB_STEP_SUMMARY
